name: Inventory Dashboard CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend
        run: |
          docker build -t inventory-backend ./backend

      - name: Build Frontend
        run: |
          docker build \
          --build-arg VITE_API_URL=http://k8s-inventor-inventor-c99e30b256-bb2f1c9bb2f4a6b4.elb.us-east-1.amazonaws.com \
          -t inventory-frontend ./frontend

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
          --region us-east-1 \
          --name inventory-dashboard-eks

      - name: Verificar Cluster
        run: |
          kubectl get nodes
          kubectl get pods -n inventory
